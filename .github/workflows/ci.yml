name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Docker build (frontend context)
        run: docker build -t lara-frontend:ci .

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --omit=dev
      - run: node --check src/index.js
      - name: Docker build (backend context)
        run: docker build -t lara-backend:ci .

  root-dockerfile-fails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Root Dockerfile must fail (wrong EasyPanel path guard)
        run: |
          docker build -t lara-root-guard . 2>&1 | tee build.log
          if grep -q "Wrong EasyPanel source path" build.log; then exit 0; fi
          echo "Expected root Dockerfile to fail with clear message"
          exit 1
