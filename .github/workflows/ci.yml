name: CI

on:
  push:
    branches: [main, deploy-fix]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Docker build (frontend context)
        run: docker build -t lara-frontend:ci .

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --omit=dev
      - run: node --check src/index.js
      - name: Docker build (backend context)
        run: docker build -t lara-backend:ci .

  no-root-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo root must not have Dockerfile (EasyPanel conflict)
        run: |
          test ! -f Dockerfile || (echo "Remove root Dockerfile — use frontend/ or backend/" && exit 1)
          echo "[OK] No root Dockerfile"

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build and smoke-test both images
        run: |
          docker build -t lara-store:ci ./frontend
          docker build -t lara-api:ci ./backend
          cid=$(docker run -d --rm -p 8000:8000 lara-api:ci)
          sleep 4
          curl -fsS http://127.0.0.1:8000/health
          docker stop "$cid"
