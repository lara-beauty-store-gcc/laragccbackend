name: Sync deploy branches

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build frontend & backend deploy branches
        run: |
          chmod +x scripts/sync-deploy-branches.sh
          ./scripts/sync-deploy-branches.sh
      - name: Push deploy branches
        run: |
          git push -f origin frontend backend lara-frontend lara-backend
