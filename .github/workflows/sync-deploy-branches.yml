name: Sync deploy branches

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync lara-frontend & lara-backend
        run: |
          chmod +x scripts/sync-deploy-branches.sh
          ./scripts/sync-deploy-branches.sh
      - name: Push deploy branches
        run: |
          git push -f origin lara-frontend
          git push -f origin lara-backend
